# Render Blueprint for AI-Native RCM
# Docs: https://render.com/docs/blueprint-spec
#
# Creates two web services:
#   1. rcm-backend   - the consolidated FastAPI backend (Docker, includes Tesseract)
#   2. rcm-frontend  - the Next.js dashboard
#
# The free plan allows only ONE free Postgres per account, so this blueprint does
# NOT create a database. Reuse your existing Render Postgres: when prompted, paste
# its Internal Database URL into DATABASE_URL.
#
# You will be prompted (sync:false, not stored in git) for:
#   DATABASE_URL, CO_API_KEY, COHERE_API_KEY, OPENAI_API_KEY

services:
  - type: web
    name: rcm-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads
      # Cohere SDK reads CO_API_KEY; we also set COHERE_API_KEY for compatibility.
      - key: CO_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: rcm-frontend
    runtime: node
    plan: free
    rootDir: ai_native_rcm_frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # Bare host from the backend service; the frontend prepends https://.
      - key: BACKEND_API_URL
        fromService:
          name: rcm-backend
          type: web
          property: host
      - key: NEXT_PUBLIC_BACKEND_API_URL
        fromService:
          name: rcm-backend
          type: web
          property: host
