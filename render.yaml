# Render Blueprint for AI-Native RCM
# Docs: https://render.com/docs/blueprint-spec
#
# Creates three resources:
#   1. rcm-db        - free managed Postgres
#   2. rcm-backend   - the consolidated FastAPI backend (Docker, includes Tesseract)
#   3. rcm-frontend  - the Next.js dashboard
#
# After the first deploy, set the two secret keys on rcm-backend (they are
# marked sync:false so they are NOT stored in git):
#   CO_API_KEY / COHERE_API_KEY  and  OPENAI_API_KEY

databases:
  - name: rcm-db
    plan: free
    databaseName: humaein
    user: humaein

services:
  - type: web
    name: rcm-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rcm-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /tmp/uploads
      # Cohere SDK reads CO_API_KEY; we also set COHERE_API_KEY for compatibility.
      - key: CO_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: rcm-frontend
    runtime: node
    plan: free
    rootDir: ai_native_rcm_frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # Bare host from the backend service; the frontend prepends https://.
      - key: BACKEND_API_URL
        fromService:
          name: rcm-backend
          type: web
          property: host
      - key: NEXT_PUBLIC_BACKEND_API_URL
        fromService:
          name: rcm-backend
          type: web
          property: host
